name: Security & Monitoring Dashboard

on:
  workflow_run:
    workflows:
      - "CodeQL"
      - "Security"
      - "Backend Monitoring"
    types: [completed]

  schedule:
    - cron: "0 */2 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: read

jobs:
  aggregate-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Fetch CodeQL alerts
        id: codeql
        run: |
          # Get CodeQL alerts from code-scanning API
          CODEQL_ALERTS=$(gh api repos/${{ github.repository }}/code-scanning/alerts --state=open -q 'length' 2>/dev/null || echo "0")
          CODEQL_CRITICAL=$(gh api repos/${{ github.repository }}/code-scanning/alerts --state=open -q '[.[] | select(.rule.security_severity_level=="critical")] | length' 2>/dev/null || echo "0")
          CODEQL_HIGH=$(gh api repos/${{ github.repository }}/code-scanning/alerts --state=open -q '[.[] | select(.rule.security_severity_level=="high")] | length' 2>/dev/null || echo "0")
          
          echo "total=$CODEQL_ALERTS" >> $GITHUB_OUTPUT
          echo "critical=$CODEQL_CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$CODEQL_HIGH" >> $GITHUB_OUTPUT
          
          echo "âś… CodeQL: $CODEQL_ALERTS alerts ($CODEQL_CRITICAL critical, $CODEQL_HIGH high)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Trivy scan results
        id: trivy
        run: |
          TRIVY_CRITICAL=0
          TRIVY_HIGH=0
          
          # Check for Trivy SARIF files from security-scans workflow
          if [ -f "trivy-backend.sarif" ] || [ -f "trivy-frontend.sarif" ]; then
            TRIVY_CRITICAL=$(jq '[.runs[0].results[] | select(.level=="error")] | length' trivy-*.sarif 2>/dev/null | awk '{s+=$1} END {print s}' || echo "0")
            TRIVY_HIGH=$(jq '[.runs[0].results[] | select(.level=="warning")] | length' trivy-*.sarif 2>/dev/null | awk '{s+=$1} END {print s}' || echo "0")
          fi
          
          echo "critical=$TRIVY_CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$TRIVY_HIGH" >> $GITHUB_OUTPUT
          
          echo "âś… Trivy: $TRIVY_CRITICAL critical, $TRIVY_HIGH high severity findings"
        continue-on-error: true

      - name: Fetch Dependabot metrics
        id: dependabot
        run: |
          # Count open Dependabot PRs
          DEPENDABOT_OPEN=$(gh pr list --author="dependabot[bot]" --state=open --json title -q 'length' 2>/dev/null || echo "0")
          
          # Count Dependabot PRs with security label
          DEPENDABOT_SECURITY=$(gh pr list --author="dependabot[bot]" --state=open --json labels -q '[.[] | select(.labels[] | select(.name | contains("security")))] | length' 2>/dev/null || echo "0")
          
          echo "open=$DEPENDABOT_OPEN" >> $GITHUB_OUTPUT
          echo "security=$DEPENDABOT_SECURITY" >> $GITHUB_OUTPUT
          
          echo "âś… Dependabot: $DEPENDABOT_OPEN open PRs ($DEPENDABOT_SECURITY security updates)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Fetch backend health metrics
        id: backend
        run: |
          # Try to get backend health status
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://backend.render.com/health 2>/dev/null || echo "0")
          BACKEND_HEALTH="Down"
          
          if [ "$BACKEND_STATUS" = "200" ]; then
            BACKEND_HEALTH="Healthy"
          elif [ "$BACKEND_STATUS" = "503" ] || [ "$BACKEND_STATUS" = "429" ]; then
            BACKEND_HEALTH="Warning"
          fi
          
          echo "status=$BACKEND_STATUS" >> $GITHUB_OUTPUT
          echo "health=$BACKEND_HEALTH" >> $GITHUB_OUTPUT
          
          echo "âś… Backend Health: $BACKEND_HEALTH ($BACKEND_STATUS)"
        continue-on-error: true

      - name: Calculate security metrics
        id: calculate
        run: |
          CODEQL_TOTAL=${{ steps.codeql.outputs.total }}
          CODEQL_CRITICAL=${{ steps.codeql.outputs.critical }}
          TRIVY_CRITICAL=${{ steps.trivy.outputs.critical }}
          DEPENDABOT_SECURITY=${{ steps.dependabot.outputs.security }}
          BACKEND_HEALTH="${{ steps.backend.outputs.health }}"
          
          # Calculate risk score (0-100)
          RISK_SCORE=$((CODEQL_CRITICAL * 20 + TRIVY_CRITICAL * 15 + DEPENDABOT_SECURITY * 10))
          RISK_SCORE=$((RISK_SCORE > 100 ? 100 : RISK_SCORE))
          
          # Determine overall health
          if [ "$RISK_SCORE" -ge 50 ] || [ "$TRIVY_CRITICAL" -gt 0 ] || [ "$CODEQL_CRITICAL" -gt 0 ]; then
            OVERALL_HEALTH="Critical"
            SEVERITY="High"
          elif [ "$RISK_SCORE" -ge 20 ]; then
            OVERALL_HEALTH="Warning"
            SEVERITY="Medium"
          else
            OVERALL_HEALTH="Secure"
            SEVERITY="Low"
          fi
          
          echo "risk_score=$RISK_SCORE" >> $GITHUB_OUTPUT
          echo "overall_health=$OVERALL_HEALTH" >> $GITHUB_OUTPUT
          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT
          
          SUMMARY="đź”Ť CodeQL: $CODEQL_TOTAL alerts | đź”’ Trivy: $TRIVY_CRITICAL critical | đź“¦ Dependabot: $DEPENDABOT_SECURITY security updates"
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          
          echo "đź“Š Security Dashboard Summary:"
          echo "  Risk Score: $RISK_SCORE/100"
          echo "  Overall Health: $OVERALL_HEALTH"
          echo "  Severity: $SEVERITY"
          echo "  Backend: $BACKEND_HEALTH"

      - name: Create project dashboard item
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString().split('T')[0];
            
            const metrics = {
              codeql_total: ${{ steps.codeql.outputs.total || 0 }},
              codeql_critical: ${{ steps.codeql.outputs.critical || 0 }},
              codeql_high: ${{ steps.codeql.outputs.high || 0 }},
              trivy_critical: ${{ steps.trivy.outputs.critical || 0 }},
              trivy_high: ${{ steps.trivy.outputs.high || 0 }},
              dependabot_open: ${{ steps.dependabot.outputs.open || 0 }},
              dependabot_security: ${{ steps.dependabot.outputs.security || 0 }},
              risk_score: ${{ steps.calculate.outputs.risk_score || 0 }},
              overall_health: "${{ steps.calculate.outputs.overall_health }}",
              severity: "${{ steps.calculate.outputs.severity }}"
            };
            
            console.log("đź“Š Dashboard Metrics:", metrics);
            console.log("đź“ť Summary: ${{ steps.calculate.outputs.summary }}");
            console.log("\nâś… Security Dashboard Update Complete");
            console.log("Timestamp:", timestamp);

      - name: Generate dashboard report
        run: |
          cat > security-dashboard-report.md << 'EOF'
          # đź›ˇď¸Ź Security & Monitoring Dashboard Report
          
          **Generated:** ${{ steps.calculate.outputs.timestamp || 'now' }}
          **Status:** ${{ steps.calculate.outputs.overall_health }}
          **Risk Score:** ${{ steps.calculate.outputs.risk_score }}/100
          
          ## đź”Ť CodeQL Analysis
          - Total Alerts: ${{ steps.codeql.outputs.total }}
          - Critical: ${{ steps.codeql.outputs.critical }}
          - High: ${{ steps.codeql.outputs.high }}
          
          ## đź”’ Trivy Container Security
          - Critical Issues: ${{ steps.trivy.outputs.critical }}
          - High Issues: ${{ steps.trivy.outputs.high }}
          
          ## đź“¦ Dependabot Dependency Management
          - Open PRs: ${{ steps.dependabot.outputs.open }}
          - Security Updates: ${{ steps.dependabot.outputs.security }}
          
          ## đźš€ Backend Health
          - Status: ${{ steps.backend.outputs.health }}
          - HTTP Code: ${{ steps.backend.outputs.status }}
          
          ---
          [View Full Dashboard](https://github.com/${{ github.repository }}/projects/4)
          EOF
          cat security-dashboard-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard-report
          path: security-dashboard-report.md
          retention-days: 30

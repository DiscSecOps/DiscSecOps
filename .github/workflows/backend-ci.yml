name: Backend CI
 
on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
 
  push:
    branches: [main]
    paths:
      - "backend/**"
 
  workflow_dispatch:
 
permissions:
  contents: read
 
jobs:
  backend-ci:
    runs-on: ubuntu-latest
 
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
 
      - name: 🐍 Setup backend env
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/app_db" > backend/.env
          echo "TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/app_db" >> backend/.env
          make install-backend
 
      - name: Seed DB
        run: make seed-database
 
      - name: 🐍 Lint backend
        run: make lint-backend
 
      - name: 🐍 Run backend tests
        run: make test-backend
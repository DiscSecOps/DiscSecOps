name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 1 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  ci:
    name: ${{ matrix.target == 'backend' && 'Backend CI' || 'Frontend CI' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $$POSTGRES_USER"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      test_db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: test_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U $$POSTGRES_USER"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ============================================================================
      # CHECKOUT & CODEQL
      # ============================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.target == 'backend' && 'python' || 'javascript-typescript' }}
          build-mode: none

      # ============================================================================
      # PYTHON SETUP
      # ============================================================================
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      # ============================================================================
      # ENV SETUP
      # ============================================================================
      - name: Setup environment files
        run: |
          # Create backend .env
          cat <<EOF > backend/.env
          DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ secrets.DB_NAME }}
          TEST_DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5434/test_db
          EOF

          # Create test env
          cat <<EOF > backend/.env.test
          TEST_USER=testuser
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_EMAIL=testuser@test.com
          EOF

      # ============================================================================
      # INSTALL DEPENDENCIES
      # ============================================================================
      - name: Install backend dependencies
        run: make install-backend

      # ============================================================================
      # WAIT FOR DATABASES
      # ============================================================================
      - name: Wait for databases
        run: |
          for i in {1..20}; do
            pg_isready -h 127.0.0.1 -p 5434 -U ${{ secrets.DB_USER }} && break
            echo "Waiting for test_db..."
            sleep 2
          done

      # ============================================================================
      # SETUP TEST DATABASE & START BACKEND
      # ============================================================================
      - name: Setup test DB and start backend
        run: |
          set -a
          source backend/.env
          set +a

          cd backend

          # Switch to test DB
          export DATABASE_URL=$TEST_DATABASE_URL

          uv run alembic upgrade head
          uv run python scripts/create_test_users.py

          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          echo "⏳ Waiting for backend..."
          sleep 10

      # ============================================================================
      # BACKEND JOBS
      # ============================================================================
      - name: 🐍 Backend - Lint & Security
        if: matrix.target == 'backend'
        run: |
          make lint-backend
          make security-backend

      - name: 🐍 Backend - Tests
        if: matrix.target == 'backend'
        run: make test-backend

      # ============================================================================
      # FRONTEND JOBS
      # ============================================================================
      - name: Setup Node.js
        if: matrix.target == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        if: matrix.target == 'frontend'
        run: make install-frontend

      - name: Frontend audit
        if: matrix.target == 'frontend'
        run: make audit-frontend

      - name: Frontend lint
        if: matrix.target == 'frontend'
        run: make lint-frontend

      - name: Frontend unit tests
        if: matrix.target == 'frontend'
        run: make test-frontend-unit

      - name: Frontend integration tests
        if: matrix.target == 'frontend'
        run: make test-frontend-integration

      # ============================================================================
      # PLAYWRIGHT / E2E
      # ============================================================================
      - name: Cache Playwright
        if: matrix.target == 'frontend'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/uv.lock') }}

      - name: Install Playwright browsers
        if: matrix.target == 'frontend' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: make install-playwright

      - name: Install Playwright deps
        if: matrix.target == 'frontend' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: make install-playwright-deps-only

      - name: Run E2E tests
        if: matrix.target == 'frontend'
        env:
          BASE_URL: http://127.0.0.1:8000
        run: |
          make run-frontend &

          npx wait-on http://localhost:3000 --timeout 120000

          if [ $? -ne 0 ]; then
            echo "❌ Frontend failed to start"
            exit 1
          fi

          cd backend
          uv run pytest tests/e2e/step_defs/ -v

      # ============================================================================
      # CLEANUP
      # ============================================================================
      - name: Cleanup
        if: always()
        run: |
          pkill -f "npm" || true
          pkill -f "node" || true
          pkill -f "uvicorn" || true

      # ============================================================================
      # CODEQL
      # ============================================================================
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.target == 'backend' && 'python' || 'javascript-typescript' }}"
          upload: always
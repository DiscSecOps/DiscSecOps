name: CI/CD Pipeline

on:
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Automatic triggers
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Weekly schedule: every Sunday at 1:30 AM
  schedule:
    - cron: '30 1 * * 0'

# ============================================================================
# PERMISSIONS
# ============================================================================
permissions:
  actions: read
  contents: read

jobs:
  ci:
    name: ${{ matrix.target == 'backend' && 'Backend CI' || 'Frontend CI' }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]

    # ============================================================================
    # SERVICES
    # ============================================================================
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: ${{ secrets.DB_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'postgres' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'app_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ============================================================================
      # COMMON STEPS
      # ============================================================================
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"        

      - name: Setup Backend Environment
        run: |
          touch backend/.env
          echo "DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER || 'postgres' }}:${{ secrets.DB_PASSWORD || 'postgres' }}@127.0.0.1:5432/${{ secrets.DB_NAME || 'app_db' }}" >> backend/.env
          echo "TEST_DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER || 'postgres' }}:${{ secrets.DB_PASSWORD || 'postgres' }}@127.0.0.1:5432/${{ secrets.DB_NAME || 'app_db' }}" >> backend/.env          
          make install-backend

      - name: Setup Test Database & Start Backend Server
        run: |
          make seed-database   
          make run-backend-for-ci

      # ============================================================================
      # BACKEND-SPECIFIC STEPS
      # ============================================================================
      
      - name: 🐍 Backend - Lint and Format
        if: matrix.target == 'backend'
        run: |
          make lint-backend

      - name: 🐍 Backend - Run Unit and Integration Tests
        if: matrix.target == 'backend'
        run: make test-backend

      # ============================================================================
      # FRONTEND-SPECIFIC STEPS
      # ============================================================================
      
      - name: ⚛️ Frontend - Setup Node.js
        if: matrix.target == 'frontend'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: ⚛️ Frontend - Install Dependencies
        if: matrix.target == 'frontend'
        run: make install-frontend

      - name: ⚛️ Frontend - Lint
        if: matrix.target == 'frontend'
        run: make lint-frontend

      - name: ⚛️ Frontend - Unit Tests (Vitest)
        if: matrix.target == 'frontend'
        run: make test-frontend-unit 

      # ----------------------------------------------------------------------------
      # PLAYWRIGHT SETUP (E2E tests)
      # ----------------------------------------------------------------------------
      
      - name: ⚛️ Frontend - Cache Playwright Browsers
        if: matrix.target == 'frontend'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/uv.lock') }}
      
      - name: ⚛️ Frontend - Install Playwright Browsers
        if: >-
          matrix.target == 'frontend' &&
          steps.playwright-cache.outputs.cache-hit != 'true'
        run: make install-playwright

      - name: ⚛️ Frontend - Install Playwright System Dependencies
        if: >-
          matrix.target == 'frontend' &&
          steps.playwright-cache.outputs.cache-hit == 'true'
        run: make install-playwright-deps-only

      - name: ⚛️ Frontend - Run E2E Tests
        if: matrix.target == 'frontend'
        env:
          BASE_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
        run: |
          make run-frontend & 
          npx wait-on http://localhost:3000 --timeout 120000
          if [ $? -ne 0 ]; then
            echo "❌ Frontend server failed to start"
            exit 1
          fi
          make test-e2e

      # ============================================================================
      # CLEANUP
      # ============================================================================
      
      - name: 🧹 Cleanup background processes
        if: always()
        run: |
          echo "Shutting down background servers..."
          pkill -f "npm" || true
          pkill -f "node" || true
          pkill -f "uvicorn" || true
name: E2E Tests

on:
  # Run only when it actually matters (release validation)
  push:
    branches: [main]

  # Manual trigger for debugging / local validation
  workflow_dispatch:

permissions:
  contents: read

# Prevent expensive parallel E2E runs
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_${{ github.run_id }}_${{ github.run_attempt }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ============================================================================
      # BACKEND SETUP
      # ============================================================================
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Setup backend
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/e2e_${{ github.run_id }}_${{ github.run_attempt }}" > backend/.env
          echo "TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/e2e_${{ github.run_id }}_${{ github.run_attempt }}" >> backend/.env

          make install-backend
          make seed-database

          make run-test-backend &
          BACKEND_PID=$!

          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV

          # Wait for backend readiness (critical for stability)
          npx wait-on http://127.0.0.1:8000/health --timeout 120000

      # ============================================================================
      # FRONTEND SETUP
      # ============================================================================
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: make install-frontend

      # ============================================================================
      # PLAYWRIGHT SETUP
      # ============================================================================
      - name: Cache Playwright
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json', 'playwright.config.*') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: make install-playwright

      # ============================================================================
      # START FRONTEND
      # ============================================================================
      - name: Start frontend
        run: |
          make run-frontend &
          FRONTEND_PID=$!

          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV

          npx wait-on http://localhost:3000 --timeout 120000

      # ============================================================================
      # RUN E2E TESTS
      # ============================================================================
      - name: Run E2E tests
        env:
          BASE_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
        run: make test-e2e

      # ============================================================================
      # CLEANUP (safe + deterministic)
      # ============================================================================
      - name: Cleanup processes
        if: always()
        run: |
          echo "Stopping backend and frontend..."

          kill $BACKEND_PID || true
          kill $FRONTEND_PID || true
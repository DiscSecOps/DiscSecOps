name: Security Scans

on:
  # Manual trigger
  workflow_dispatch:
  
  # Run on every push to main/develop
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
  
  # Run on pull requests to main
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
  
  # Daily scan at 2:00 AM
  schedule:
    - cron: '0 2 * * *'

# ============================================================================
# PERMISSIONS
# ============================================================================
# security-events: write is required to upload results to GitHub Security tab
permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================================
  # BACKEND SECURITY (Python / FastAPI)
  # ============================================================================
  backend-security:
    runs-on: ubuntu-latest
    name: Backend Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install security tools
        run: |
          pip install bandit safety
        
      - name: Run Bandit (Python security linter)
        continue-on-error: true
        run: |
          bandit -r backend/ -x tools -f json -o bandit-report.json
          bandit -r backend/ -x tools -f txt -o bandit-report.txt
      
      - name: Run Safety (check dependencies for CVEs)
        run: |
          safety check -r backend/pyproject.toml --json > safety-report.json
      
      - name: Run Trivy on backend code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'sarif'
          output: 'trivy-backend.sarif'
      
      - name: Upload backend security reports (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            bandit-report.json
            bandit-report.txt
            safety-report.json
            trivy-backend.sarif
          retention-days: 30
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif

  # ============================================================================
  # FRONTEND SECURITY (React / npm)
  # ============================================================================
  frontend-security:
    runs-on: ubuntu-latest
    name: Frontend Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run npm audit
        run: |
          cd frontend
          npm audit --json > npm-audit-report.json
          npm audit --audit-level=high
        continue-on-error: true
      
      - name: Run Trivy on frontend code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
      
      - name: Run OWASP Dependency Check (additional)
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: 'Frontend Dependencies'
          path: './frontend'
          format: 'HTML'
          out: 'dependency-check-report.html'
      
      - name: Upload frontend security reports (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: |
            frontend/npm-audit-report.json
            trivy-frontend.sarif
            dependency-check-report.html
          retention-days: 30
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif

  # ============================================================================
  # SECRETS SCANNING (detect leaked secrets in code)
  # ============================================================================
  secrets-scanning:
    runs-on: ubuntu-latest
    name: Secrets Scanning (Gitleaks)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks (detect secrets in code)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ============================================================================
  # CODEQL ANALYSIS (full project)
  # ============================================================================
  codeql-analysis:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'python, javascript-typescript'
          build-mode: none
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: always
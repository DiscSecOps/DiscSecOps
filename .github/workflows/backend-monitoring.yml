name: Backend Monitoring
 
on:
  schedule:
    - cron: "*/10 * * * *"  # la 10 minute
  workflow_dispatch:
 
jobs:
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check health
        run: |
          curl -s -f "${{ secrets.BACKEND_URL }}/health" > health.json || echo "Health check failed"
          echo "Health check done"
 
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: backend-health
          path: health.json
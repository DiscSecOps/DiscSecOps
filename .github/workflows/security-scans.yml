name: Security
 
on:
  workflow_dispatch:
 
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
 
  schedule:
    - cron: "0 2 * * 0"
 
permissions:
  contents: read
  security-events: write
 
jobs:
 
  # =========================================================
  # BACKEND SECURITY SCANS
  # =========================================================
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
 
    steps:
      - uses: actions/checkout@v6
 
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
 
      - name: Install tools
        run: |
          pip install bandit pip-audit uv
 
      - name: Run Bandit
        run: |
          bandit -r backend/ -x tools -f json -o bandit.json || true
 
      - name: Run pip-audit
        run: |
          cd backend
          uv export --format requirements-txt --no-hashes > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt -f json -o ../pip-audit.json || true
 
      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-backend.sarif
 
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-security
          path: |
            bandit.json
            pip-audit.json
            trivy-backend.sarif
          retention-days: 3
 
 
  # =========================================================
  # FRONTEND SECURITY SCANS
  # =========================================================
  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
 
    steps:
      - uses: actions/checkout@v6
 
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
 
      - name: Install deps
        run: cd frontend && npm ci
 
      - name: npm audit
        run: |
          cd frontend
          npm audit --json > npm-audit.json || true
 
      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: sarif
          output: trivy-frontend.sarif
 
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-security
          path: |
            frontend/npm-audit.json
            trivy-frontend.sarif
          retention-days: 3
 
 
  # =========================================================
  # SECRETS SCANNING
  # =========================================================
  secrets-scanning:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
 
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: secrets-report
          path: gitleaks-report.json
          retention-days: 3
 
 
  # =========================================================
  # SECURITY GATE (BLOCKER)
  # =========================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
 
    needs:
      - backend-security
      - frontend-security
      - secrets-scanning
 
    steps:
      - name: Download all scan results
        uses: actions/download-artifact@v8
 
      - name: Evaluate security policy
        run: |
          echo "Evaluating security reports..."
 
          BLOCK=0
 
          # 1. Secrets = always block
          if grep -R "leak\|secret\|api_key" . 2>/dev/null; then
            echo "❌ Secrets detected"
            BLOCK=1
          fi
 
          # 2. Trivy critical vulnerabilities
          if grep -R "CRITICAL" . 2>/dev/null; then
            echo "❌ Critical vulnerabilities detected"
            BLOCK=1
          fi
 
          # 3. pip-audit high severity
          if grep -R "\"severity\": \"high\"" . 2>/dev/null; then
            echo "⚠️ High severity dependency issue"
            # optional: BLOCK=1
          fi
 
          if [ "$BLOCK" -eq 1 ]; then
            echo "Security Gate FAILED"
            exit 1
          fi
 
          echo "Security Gate PASSED"
version: 2
updates:
  # ============================================
  # React / npm frontend dependencies
  # ============================================
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"
    versioning-strategy: "auto"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

    ignore:
      - dependency-name: "vite"
        versions: [">=8.0.0"]
        
    labels:
      - "dependencies"
      - "security"
      - "frontend"
    open-pull-requests-limit: 10
 
  # ============================================
  # Python backend dependencies (FastAPI)
  # ============================================
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"
    versioning-strategy: "auto"
    commit-message:
      prefix: "fix(deps-python)"
      include: "scope"
    groups:
      python-safe-updates:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "security"
      - "backend"
    open-pull-requests-limit: 10
 
  # ============================================
  # GitHub Actions (workflow dependencies)
  # ============================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"
    labels:
      - "ci"
      - "dependencies"
    open-pull-requests-limit: 5